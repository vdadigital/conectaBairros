<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conecta Bairros - Empreendedores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body class="bg-gray-100">

    <header class="bg-blue-600 text-white p-6 shadow-md mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            
            <div class="w-1/4">
                <img src="img/logo-conecta.png" alt="Logo Conecta Bairros" class="h-16 object-contain" onerror="this.style.display='none'">
            </div>

            <div class="w-2/4 text-center">
                <h1 class="text-3xl font-bold">Conecta Bairros 🏠</h1>
                <p class="mt-2 text-blue-100">Conectando empreendedores locais e a comunidade</p>
            </div>

            <div class="w-1/4 flex justify-end">
                <img src="img/logo-faspec.png" alt="Logo Faspec" class="h-16 object-contain" onerror="this.style.display='none'">
            </div>

        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4">
        
        <div class="flex justify-end mb-6">
            <button onclick="fazerLoginGoogle()" class="bg-white text-gray-700 font-semibold py-2 px-4 border border-gray-300 rounded shadow-sm hover:bg-gray-50 flex items-center gap-2 transition">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.58c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.58-2.77c-.98.66-2.23 1.06-3.7 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/><path fill="none" d="M1 1h22v22H1z"/></svg>
                Login do Empreendedor
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-md border border-gray-200 h-fit">
                <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Cadastrar Negócio</h2>
                
                <form id="form-cadastro">
                    <div class="mb-3">
                        <label class="block text-sm font-semibold text-gray-700">Nome do Negócio</label>
                        <input type="text" id="reg-nome" required class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    
                    <div class="mb-3">
                        <label class="block text-sm font-semibold text-gray-700">Categoria</label>
                        <select id="reg-categoria" required class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="">Selecione...</option>
                            <option value="Alimentação">Alimentação</option>
                            <option value="Serviços">Serviços</option>
                            <option value="Varejo">Varejo</option>
                            <option value="Saúde">Saúde e Beleza</option>
                            <option value="Tecnologia">Tecnologia</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="block text-sm font-semibold text-gray-700">Estado (UF)</label>
                        <input type="text" id="reg-estado" required maxlength="2" placeholder="Ex: SC" class="mt-1 w-full p-2 border rounded uppercase focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    
                    <div class="mb-3">
                        <label class="block text-sm font-semibold text-gray-700">WhatsApp (Apenas números)</label>
                        <input type="text" id="reg-whatsapp" required placeholder="Ex: 5548999999999" class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    
                    <div class="mb-3">
                        <label class="block text-sm font-semibold text-gray-700">Descrição</label>
                        <textarea id="reg-descricao" required rows="3" class="mt-1 w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                    </div>

                    <div class="mb-5">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Foto ou Logo (Opcional)</label>
                        <input type="file" id="imagem-loja" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                    </div>
                    
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded hover:bg-blue-700 transition shadow-md">
                        Cadastrar Negócio
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2">
                <h2 class="text-2xl font-bold text-gray-800 mb-4">Comércios Locais</h2>
                
                <div id="container-comercios" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="col-span-full flex justify-center py-10">
                        <p class="text-gray-500 animate-pulse">Procurando comércios cadastrados...</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <section class="max-w-6xl mx-auto p-4 mt-12 mb-8 border-t border-gray-300 pt-8">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Nossa Equipe</h2>
        <div class="flex flex-wrap justify-center gap-4 text-center">
            <div class="bg-white p-4 rounded shadow-sm border border-gray-100 w-36">
                <p class="font-bold text-gray-800">Luiz Silva</p>
                <p class="text-xs text-blue-600 font-semibold">Full-Stack / SEO</p>
            </div>
            <div class="bg-white p-4 rounded shadow-sm border border-gray-100 w-36">
                <p class="font-bold text-gray-800">Brunno</p>
                <p class="text-xs text-blue-600 font-semibold">Relações Públicas</p>
            </div>
            <div class="bg-white p-4 rounded shadow-sm border border-gray-100 w-36">
                <p class="font-bold text-gray-800">Lourival</p>
                <p class="text-xs text-blue-600 font-semibold">Apresentador</p>
            </div>
            <div class="bg-white p-4 rounded shadow-sm border border-gray-100 w-36">
                <p class="font-bold text-gray-800">Felipe</p>
                <p class="text-xs text-blue-600 font-semibold">Python</p>
            </div>
            <div class="bg-white p-4 rounded shadow-sm border border-gray-100 w-36">
                <p class="font-bold text-gray-800">Luciano</p>
                <p class="text-xs text-blue-600 font-semibold">QA</p>
            </div>
        </div>
    </section>

    <script src="conectabairros.js?v=7"></script>

</body>
</html>
